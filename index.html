<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeamSync - チーム情報共有</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', primaryHover: '#4338ca' }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* PWA Safe Area for modern smartphones */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconPlus = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconImage = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const IconLink = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconMessageCircle = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        const IconEdit = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconBell = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>;

        // --- Utils ---
        const timeAgo = (ms) => {
            const seconds = Math.floor((Date.now() - ms) / 1000);
            if (seconds < 60) return "たった今";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}分前`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}時間前`;
            const days = Math.floor(hours / 24);
            if (days < 30) return `${days}日前`;
            const date = new Date(ms);
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1000;
                        let { width, height } = img;
                        if (width > height && width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        } else if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compress for Firestore limits
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        };

        const generatePWA = () => {
            try {
                const manifest = {
                    name: "TeamSync", short_name: "TeamSync", display: "standalone", start_url: ".",
                    background_color: "#f8fafc", theme_color: "#4f46e5",
                    icons: [{
                        src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNGY0NmU1IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTE3IDIxdi0yYTQgNCAwIDAgMC00LTRINWE0IDQgMCAwIDAtNCA0djIiPjwvcGF0aD48Y2lyY2xlIGN4PSI5IiBjeT0iNyIgcj0iNCI+PC9jaXJjbGU+PHBhdGggZD0iTTIzIDIxdi0yYTQgNCAwIDAgMC0zLTMuODciPjwvcGF0aD48cGF0aCBkPSJNMTYgMy4xM2E0IDQgMCAwIDEgMCA3Ljc1Ij48L3BhdGg+PC9zdmc+",
                        sizes: "192x192", type: "image/svg+xml"
                    }]
                };
                const blobManifest = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
                const link = document.createElement('link');
                link.rel = 'manifest';
                link.href = URL.createObjectURL(blobManifest);
                document.head.appendChild(link);

                if ('serviceWorker' in navigator) {
                    const swCode = `self.addEventListener('fetch', function(e) {});`;
                    const blobSW = new Blob([swCode], {type: 'application/javascript'});
                    navigator.serviceWorker.register(URL.createObjectURL(blobSW)).catch(()=>{});
                }
            } catch(e){}
        };

        // --- App Component ---
        const App = () => {
            const [fbReady, setFbReady] = React.useState(!!window.firebaseModules);
            const [appId, setAppId] = React.useState('default-teamsync-app');
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            
            const [posts, setPosts] = React.useState([]);
            const [view, setView] = React.useState('list'); // list, detail, form
            const [selectedPost, setSelectedPost] = React.useState(null);

            // 1. Initialize Firebase & PWA
            React.useEffect(() => {
                generatePWA();
                const init = () => {
                    setFbReady(true);
                    const { initializeApp, getAuth, getFirestore } = window.firebaseModules;
                    let config = {};
                    try { config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {}; } catch(e){}
                    const app = initializeApp(config);
                    setAuth(getAuth(app));
                    setDb(getFirestore(app));
                    if (typeof __app_id !== 'undefined') setAppId(__app_id);
                };
                if (window.firebaseModules) init();
                else window.addEventListener('firebaseLoaded', init);
                return () => window.removeEventListener('firebaseLoaded', init);
            }, []);

            // 2. Auth Flow (Rule 3)
            React.useEffect(() => {
                if (!auth) return;
                const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.firebaseModules;
                const doAuth = async () => {
                    try {
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);
                    } catch(e) { console.error("Auth failed", e); }
                };
                doAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [auth]);

            // 3. Data Fetching (Profile & Posts)
            React.useEffect(() => {
                if (!db || !user) return;
                const { doc, onSnapshot, collection } = window.firebaseModules;
                
                // Fetch Profile (Private Data - Rule 1)
                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
                const unsubProfile = onSnapshot(profileRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setProfile(docSnap.data());
                    } else {
                        setProfile({ isNew: true });
                    }
                }, console.error);

                // Fetch Posts (Public Data - Rule 1)
                const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                const unsubPosts = onSnapshot(postsRef, (snap) => {
                    let loaded = [];
                    snap.forEach(d => loaded.push({ id: d.id, ...d.data() }));
                    // Sort in memory (Rule 2)
                    loaded.sort((a, b) => b.updatedAt - a.updatedAt);
                    setPosts(loaded);
                }, console.error);

                return () => { unsubProfile(); unsubPosts(); };
            }, [db, user, appId]);

            if (!fbReady || !user || !profile) {
                return <div className="min-h-screen flex items-center justify-center text-gray-400">Loading TeamSync...</div>;
            }

            // Welcome Screen (Set Name)
            if (profile.isNew) {
                return <WelcomeScreen db={db} appId={appId} userId={user.uid} />;
            }

            // Routing Handlers
            const goHome = () => { setView('list'); setSelectedPost(null); };
            const openForm = (post = null) => { setSelectedPost(post); setView('form'); };
            const openDetail = (post) => { setSelectedPost(post); setView('detail'); };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative overflow-hidden flex flex-col pb-safe">
                    {/* Header */}
                    <div className="bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-3 sticky top-0 z-10 pt-safe flex items-center justify-between">
                        {view !== 'list' ? (
                            <button onClick={goHome} className="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                                <IconArrowLeft />
                            </button>
                        ) : (
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-primary text-white rounded-lg flex items-center justify-center font-bold text-lg shadow-sm shadow-primary/30">T</div>
                                <div>
                                    <h1 className="font-bold text-gray-900 leading-tight">TeamSync</h1>
                                    <p className="text-[10px] text-gray-500 font-medium">情報共有 & マニュアル</p>
                                </div>
                            </div>
                        )}
                        <div className="flex items-center gap-3">
                            {view === 'list' && (
                                <div className="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1.5 rounded-full">
                                    {profile.name}
                                </div>
                            )}
                            {view === 'detail' && (
                                <button onClick={() => openForm(selectedPost)} className="p-2 -mr-2 text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                                    <IconEdit size={20} />
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 overflow-y-auto hide-scrollbar bg-slate-50 relative">
                        {view === 'list' && (
                            <PostList posts={posts} profile={profile} onOpen={openDetail} />
                        )}
                        {view === 'detail' && selectedPost && (
                            <PostDetail 
                                post={posts.find(p => p.id === selectedPost.id) || selectedPost} 
                                profile={profile} 
                                db={db} appId={appId} userId={user.uid} 
                            />
                        )}
                        {view === 'form' && (
                            <PostForm 
                                post={selectedPost} profile={profile} 
                                db={db} appId={appId} userId={user.uid} 
                                onSave={goHome} onCancel={selectedPost ? () => setView('detail') : goHome}
                            />
                        )}
                    </div>

                    {/* FAB */}
                    {view === 'list' && (
                        <button onClick={() => openForm()} className="fixed bottom-6 right-1/2 translate-x-[180px] w-14 h-14 bg-primary text-white rounded-2xl shadow-lg shadow-primary/40 flex items-center justify-center hover:bg-primaryHover hover:scale-105 active:scale-95 transition-all z-20">
                            <IconPlus />
                        </button>
                    )}
                </div>
            );
        };

        // --- Screens & Components ---

        const WelcomeScreen = ({ db, appId, userId }) => {
            const [name, setName] = React.useState('');
            const saveProfile = async () => {
                if(!name.trim()) return;
                const { doc, setDoc } = window.firebaseModules;
                await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'main'), {
                    name: name.trim(), readStatus: {}
                });
            };
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-indigo-50 to-white text-center">
                    <div className="w-16 h-16 bg-primary text-white rounded-2xl flex items-center justify-center font-bold text-3xl shadow-xl shadow-primary/30 mb-6">T</div>
                    <h1 className="text-2xl font-bold text-gray-900 mb-2">TeamSync へようこそ</h1>
                    <p className="text-gray-500 text-sm mb-8">チーム内で共有されるマニュアルや指示を<br/>リアルタイムで確認できるアプリです。</p>
                    <input 
                        type="text" value={name} onChange={e => setName(e.target.value)}
                        placeholder="あなたの表示名（例: 山田 太郎）"
                        className="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-primary/50 shadow-sm"
                    />
                    <button onClick={saveProfile} disabled={!name.trim()} className="w-full bg-primary text-white font-bold py-3 rounded-xl disabled:opacity-50 shadow-md">
                        はじめる
                    </button>
                </div>
            );
        };

        const PostList = ({ posts, profile, onOpen }) => {
            if (posts.length === 0) {
                return (
                    <div className="h-full flex flex-col items-center justify-center text-gray-400 p-8 text-center space-y-4">
                        <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-2"><IconMessageCircle size={32} className="text-gray-300" /></div>
                        <p>まだ情報がありません。<br/>右下の＋ボタンから最初の指示やマニュアルを作成しましょう。</p>
                    </div>
                );
            }

            return (
                <div className="p-4 space-y-4">
                    {posts.map(post => {
                        const lastRead = profile.readStatus?.[post.id] || 0;
                        const isNew = post.createdAt === post.updatedAt && post.createdAt > lastRead;
                        const isUpdated = post.createdAt !== post.updatedAt && post.updatedAt > lastRead;
                        const commentCount = post.comments ? post.comments.length : 0;

                        return (
                            <div key={post.id} onClick={() => onOpen(post)} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 slide-up cursor-pointer hover:shadow-md transition-all active:scale-[0.98]">
                                <div className="flex items-start justify-between mb-2">
                                    <h2 className="font-bold text-gray-900 leading-tight line-clamp-2 pr-2">{post.title}</h2>
                                    {isNew && <span className="shrink-0 bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-md">✨ New</span>}
                                    {isUpdated && <span className="shrink-0 bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-1 rounded-md">🔄 変更あり</span>}
                                </div>
                                <p className="text-sm text-gray-500 line-clamp-2 mb-3">{post.content}</p>
                                
                                {post.mediaBase64 && (
                                    <div className="h-24 w-full rounded-lg bg-gray-100 mb-3 overflow-hidden">
                                        <img src={post.mediaBase64} alt="thumbnail" className="w-full h-full object-cover opacity-90" />
                                    </div>
                                )}
                                
                                <div className="flex items-center justify-between text-xs text-gray-400 font-medium">
                                    <div className="flex items-center gap-2">
                                        <div className="w-5 h-5 rounded-full bg-indigo-50 text-primary flex items-center justify-center text-[10px] uppercase">{post.authorName[0]}</div>
                                        <span>{post.authorName}</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {commentCount > 0 && (
                                            <div className="flex items-center gap-1"><IconMessageCircle size={14}/> {commentCount}</div>
                                        )}
                                        <span>{timeAgo(post.updatedAt)}</span>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const PostDetail = ({ post, profile, db, appId, userId }) => {
            const [comment, setComment] = React.useState('');
            // Store the initial read time when entering the view to show correct banners
            const [initialRead] = React.useState(profile.readStatus?.[post.id] || 0);

            // Mark as read in DB
            React.useEffect(() => {
                if (post.updatedAt > initialRead) {
                    const { doc, setDoc } = window.firebaseModules;
                    const updatedStatus = { ...profile.readStatus, [post.id]: Date.now() };
                    setDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'main'), { readStatus: updatedStatus }, { merge: true });
                }
            }, [post.id]);

            const submitComment = async () => {
                if(!comment.trim()) return;
                const { doc, updateDoc } = window.firebaseModules;
                const newComment = { id: crypto.randomUUID(), authorId: userId, authorName: profile.name, text: comment.trim(), createdAt: Date.now() };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id), {
                    comments: [...(post.comments || []), newComment]
                });
                setComment('');
            };

            const newLogs = (post.updateLogs || []).filter(log => log.timestamp > initialRead);

            return (
                <div className="flex flex-col min-h-full bg-white slide-up pb-20">
                    <div className="p-5">
                        <h1 className="text-xl font-bold text-gray-900 mb-4 leading-snug">{post.title}</h1>
                        
                        <div className="flex items-center justify-between border-b border-gray-100 pb-4 mb-4">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-indigo-50 text-primary flex items-center justify-center font-bold uppercase">{post.authorName[0]}</div>
                                <div>
                                    <div className="text-sm font-semibold text-gray-900">{post.authorName}</div>
                                    <div className="text-xs text-gray-400">{timeAgo(post.createdAt)} 作成</div>
                                </div>
                            </div>
                        </div>

                        {/* Update Notification Banner */}
                        {newLogs.length > 0 && (
                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-5 shadow-sm">
                                <h3 className="text-amber-800 font-bold flex items-center gap-2 mb-2 text-sm">
                                    <IconBell size={16} /> 前回閲覧からの更新内容
                                </h3>
                                <ul className="space-y-2">
                                    {newLogs.map((log, i) => (
                                        <li key={i} className="text-sm text-amber-900 bg-white/50 p-2 rounded-lg border border-amber-100">
                                            <span className="font-semibold">{log.authorName}:</span> {log.note}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        <div className="text-gray-800 text-base leading-relaxed whitespace-pre-wrap mb-6">
                            {post.content}
                        </div>

                        {post.mediaBase64 && (
                            <div className="mb-6 rounded-xl overflow-hidden border border-gray-100 shadow-sm">
                                <img src={post.mediaBase64} alt="添付画像" className="w-full h-auto" />
                            </div>
                        )}

                        {post.link && (
                            <a href={post.link} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 p-4 mb-6 bg-slate-50 border border-slate-200 rounded-xl hover:bg-slate-100 transition-colors">
                                <div className="bg-white p-2 rounded-lg shadow-sm"><IconLink size={20} className="text-primary" /></div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-sm font-bold text-gray-900 truncate">参考リンクを開く</div>
                                    <div className="text-xs text-gray-500 truncate mt-0.5">{post.link}</div>
                                </div>
                            </a>
                        )}

                        {/* Comments Section */}
                        <div className="mt-8 pt-6 border-t border-gray-100">
                            <h3 className="font-bold text-gray-900 mb-4 flex items-center gap-2">
                                <IconMessageCircle size={18}/> コメント・質問 ({post.comments?.length || 0})
                            </h3>
                            <div className="space-y-4 mb-6">
                                {(post.comments || []).map(c => (
                                    <div key={c.id} className="bg-gray-50 rounded-xl p-3 px-4">
                                        <div className="flex items-center justify-between mb-1">
                                            <span className="font-bold text-sm text-gray-900">{c.authorName}</span>
                                            <span className="text-xs text-gray-400">{timeAgo(c.createdAt)}</span>
                                        </div>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Fixed Comment Input */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-3 pb-safe z-10 flex items-center gap-2">
                        <input 
                            type="text" value={comment} onChange={e => setComment(e.target.value)}
                            placeholder="質問や補足をコメント..."
                            className="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-full px-4 py-2.5 text-sm transition-all"
                        />
                        <button onClick={submitComment} disabled={!comment.trim()} className="p-2.5 bg-primary text-white rounded-full disabled:opacity-50 hover:bg-primaryHover transition-colors shrink-0">
                            <IconSend size={18} />
                        </button>
                    </div>
                </div>
            );
        };

        const PostForm = ({ post, profile, db, appId, userId, onSave, onCancel }) => {
            const isEdit = !!post;
            const [title, setTitle] = React.useState(post?.title || '');
            const [content, setContent] = React.useState(post?.content || '');
            const [link, setLink] = React.useState(post?.link || '');
            const [mediaBase64, setMediaBase64] = React.useState(post?.mediaBase64 || null);
            const [updateNote, setUpdateNote] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const handleImage = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                try {
                    const base64 = await compressImage(file);
                    setMediaBase64(base64);
                } catch(err) { alert('画像の処理に失敗しました。'); }
            };

            const submit = async () => {
                if(!title.trim() || !content.trim()) return;
                setSaving(true);
                const { collection, doc, setDoc, updateDoc } = window.firebaseModules;
                const now = Date.now();

                try {
                    if (isEdit) {
                        const logs = post.updateLogs || [];
                        if (updateNote.trim()) {
                            logs.push({ timestamp: now, authorName: profile.name, note: updateNote.trim() });
                        }
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id), {
                            title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64,
                            updatedAt: now, updateLogs: logs
                        });
                    } else {
                        const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'));
                        await setDoc(newRef, {
                            id: newRef.id, title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64,
                            createdAt: now, updatedAt: now, authorId: userId, authorName: profile.name,
                            comments: [], updateLogs: []
                        });
                    }
                    onSave();
                } catch(e) { console.error(e); alert("保存に失敗しました。"); setSaving(false); }
            };

            const handleDelete = async () => {
                if(confirm("このマニュアルを削除しますか？")) {
                    setSaving(true);
                    const { doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id));
                    onSave();
                }
            };

            return (
                <div className="p-5 bg-white min-h-full slide-up flex flex-col pb-safe">
                    <h2 className="text-xl font-bold text-gray-900 mb-6">{isEdit ? 'マニュアルの編集' : '新規マニュアル作成'}</h2>
                    
                    <div className="space-y-5 flex-1">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">タイトル</label>
                            <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：商品Aの撮影ルール" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary/50" />
                        </div>
                        
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">指示内容・マニュアル本文</label>
                            <textarea value={content} onChange={e=>setContent(e.target.value)} rows="5" placeholder="詳細な手順や注意点を入力してください" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none"></textarea>
                        </div>

                        {/* Media Section */}
                        <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
                            <div>
                                <label className="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2"><IconImage size={18}/> 画像を添付</label>
                                {mediaBase64 ? (
                                    <div className="relative rounded-lg overflow-hidden border border-gray-200">
                                        <img src={mediaBase64} className="w-full h-32 object-cover" />
                                        <button onClick={()=>setMediaBase64(null)} className="absolute top-2 right-2 bg-black/60 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm">✕</button>
                                    </div>
                                ) : (
                                    <label className="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                                        <div className="text-sm text-gray-500 font-medium">タップして写真を選択</div>
                                        <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                    </label>
                                )}
                            </div>
                            
                            <div>
                                <label className="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2"><IconLink size={18}/> 参考リンク (動画・大容量ファイル等)</label>
                                <input type="url" value={link} onChange={e=>setLink(e.target.value)} placeholder="https://..." className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50" />
                                <p className="text-[10px] text-gray-500 mt-1">※動画や資料はGoogle Drive等の共有リンクを貼付してください</p>
                            </div>
                        </div>

                        {isEdit && (
                            <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl">
                                <label className="block text-xs font-bold text-amber-800 mb-1.5">今回の変更内容（他のメンバーに通知されます）</label>
                                <input type="text" value={updateNote} onChange={e=>setUpdateNote(e.target.value)} placeholder="例：背景色の指定を白に変更しました" className="w-full bg-white border border-amber-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" />
                            </div>
                        )}
                    </div>

                    <div className="mt-8 flex gap-3 pb-4">
                        {isEdit && <button onClick={handleDelete} disabled={saving} className="p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors"><IconTrash/></button>}
                        <button onClick={onCancel} disabled={saving} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200 transition-colors">キャンセル</button>
                        <button onClick={submit} disabled={saving || !title.trim() || !content.trim()} className="flex-1 bg-primary text-white font-bold py-3 rounded-xl hover:bg-primaryHover transition-colors shadow-md disabled:opacity-50">
                            {saving ? '保存中...' : (isEdit ? '更新する' : '投稿する')}
                        </button>
                    </div>
                </div>
            );
        };

        const IconTrash = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
