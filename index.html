<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeamSync - チーム情報共有</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: { 
                        primary: '#3b82f6',     // Blue 500
                        primaryHover: '#2563eb', // Blue 600
                        accent: '#6366f1'        // Indigo 500
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
    <style>
        body { 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            color: #0f172a;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // 【重要】Firebaseプロジェクトの設定
        // 実際にシステムとして運用する場合は、ご自身のFirebaseプロジェクトの設定を
        // 以下に貼り付けてください。（Firebaseコンソールから取得できます）
        // =========================================================================
        const USER_FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAFwlFLR6Ck3hr9yRPkAEbwHJD_oV1BBI",
  authDomain: "ito-game-90d85.firebaseapp.com",
  projectId: "ito-game-90d85",
  storageBucket: "ito-game-90d85.firebasestorage.app",
  messagingSenderId: "142358300494",
  appId: "1:142358300494:web:8081759097cf17ed03c01f",
  measurementId: "G-4HZT4F4D7J"
};
        // =========================================================================

        // --- 洗練された細線のアイコン群 (Stroke Width 1.5) ---
        const IconPlus = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconImage = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const IconLink = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconMessageCircle = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        const IconEdit = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconBell = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>;
        const IconTrash = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconSettings = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>

        // --- Utils ---
        const timeAgo = (ms) => {
            const seconds = Math.floor((Date.now() - ms) / 1000);
            if (seconds < 60) return "たった今";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}分前`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}時間前`;
            const days = Math.floor(hours / 24);
            if (days < 30) return `${days}日前`;
            const date = new Date(ms);
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1000;
                        let { width, height } = img;
                        if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                        else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        };

        // --- App Component ---
        const App = () => {
            const [fbReady, setFbReady] = React.useState(!!window.firebaseModules);
            const [configError, setConfigError] = React.useState(false);
            const [appId, setAppId] = React.useState('default-teamsync-app');
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            
            const [posts, setPosts] = React.useState([]);
            const [view, setView] = React.useState('list'); 
            const [selectedPost, setSelectedPost] = React.useState(null);

            // 1. Initialize Firebase
            React.useEffect(() => {
                const init = () => {
                    setFbReady(true);
                    const { initializeApp, getAuth, getFirestore } = window.firebaseModules;
                    
                    let config = null;
                    // 環境変数からの読み込み（Canvas環境用）
                    try { 
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            config = JSON.parse(__firebase_config); 
                        }
                    } catch(e){}

                    // ユーザー設定の読み込み（ローカル環境用）
                    if (!config && USER_FIREBASE_CONFIG.apiKey) {
                        config = USER_FIREBASE_CONFIG;
                    }

                    // 設定が空の場合はエラー画面を表示
                    if (!config || !config.apiKey) {
                        setConfigError(true);
                        return;
                    }

                    try {
                        const app = initializeApp(config);
                        setAuth(getAuth(app));
                        setDb(getFirestore(app));
                        if (typeof __app_id !== 'undefined') setAppId(__app_id);
                    } catch (e) {
                        console.error("Firebase初期化エラー:", e);
                        setConfigError(true);
                    }
                };
                if (window.firebaseModules) init();
                else window.addEventListener('firebaseLoaded', init);
                return () => window.removeEventListener('firebaseLoaded', init);
            }, []);

            // 2. Auth Flow
            React.useEffect(() => {
                if (!auth) return;
                const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.firebaseModules;
                const doAuth = async () => {
                    try {
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);
                    } catch(e) { console.error("認証失敗", e); }
                };
                doAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [auth]);

            // 3. Data Fetching
            React.useEffect(() => {
                if (!db || !user) return;
                const { doc, onSnapshot, collection } = window.firebaseModules;
                
                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
                const unsubProfile = onSnapshot(profileRef, (docSnap) => {
                    if (docSnap.exists()) setProfile(docSnap.data());
                    else setProfile({ isNew: true });
                }, console.error);

                const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                const unsubPosts = onSnapshot(postsRef, (snap) => {
                    let loaded = [];
                    snap.forEach(d => loaded.push({ id: d.id, ...d.data() }));
                    loaded.sort((a, b) => b.updatedAt - a.updatedAt);
                    setPosts(loaded);
                }, console.error);

                return () => { unsubProfile(); unsubPosts(); };
            }, [db, user, appId]);

            if (configError) return <ConfigErrorScreen />;
            if (!fbReady || !user || !profile) {
                return <div className="min-h-screen flex items-center justify-center text-slate-400 bg-slate-50">システムの読み込み中...</div>;
            }
            if (profile.isNew) return <WelcomeScreen db={db} appId={appId} userId={user.uid} />;

            // Handlers
            const goHome = () => { setView('list'); setSelectedPost(null); };
            const openForm = (post = null) => { setSelectedPost(post); setView('form'); };
            const openDetail = (post) => { setSelectedPost(post); setView('detail'); };

            return (
                <div className="max-w-md mx-auto bg-[#f8fafc] min-h-screen shadow-[0_0_40px_rgba(0,0,0,0.05)] relative flex flex-col font-sans text-slate-800">
                    {/* Glassmorphism Header */}
                    <div className="glass-header px-5 py-3.5 sticky top-0 z-20 pt-safe flex items-center justify-between transition-all">
                        {view !== 'list' ? (
                            <button onClick={goHome} className="p-2 -ml-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100/50 rounded-full transition-all">
                                <IconArrowLeft />
                            </button>
                        ) : (
                            <div className="flex items-center gap-3 animate-fade-in">
                                <div className="w-9 h-9 bg-gradient-to-br from-primary to-accent text-white rounded-xl flex items-center justify-center font-bold text-lg shadow-lg shadow-primary/30">
                                    T
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="font-bold text-slate-800 text-lg leading-none tracking-tight">TeamSync</h1>
                                    <span className="text-[10px] text-slate-500 font-medium mt-1">チーム情報共有</span>
                                </div>
                            </div>
                        )}
                        
                        <div className="flex items-center gap-2">
                            {view === 'list' && (
                                <div className="flex items-center gap-2 px-3 py-1.5 bg-white rounded-full shadow-sm border border-slate-100">
                                    <div className="w-5 h-5 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-[10px] font-bold uppercase">
                                        {profile.name[0]}
                                    </div>
                                    <span className="text-xs font-semibold text-slate-600">{profile.name}</span>
                                </div>
                            )}
                            {view === 'detail' && (
                                <button onClick={() => openForm(selectedPost)} className="p-2 -mr-2 text-slate-500 hover:text-primary hover:bg-slate-100/50 rounded-full transition-all">
                                    <IconEdit size={20} />
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 overflow-y-auto hide-scrollbar relative">
                        {view === 'list' && <PostList posts={posts} profile={profile} onOpen={openDetail} />}
                        {view === 'detail' && selectedPost && (
                            <PostDetail post={posts.find(p => p.id === selectedPost.id) || selectedPost} profile={profile} db={db} appId={appId} userId={user.uid} />
                        )}
                        {view === 'form' && (
                            <PostForm post={selectedPost} profile={profile} db={db} appId={appId} userId={user.uid} onSave={goHome} onCancel={selectedPost ? () => setView('detail') : goHome} />
                        )}
                    </div>

                    {/* FAB Button */}
                    {view === 'list' && (
                        <button onClick={() => openForm()} className="fixed bottom-8 right-1/2 translate-x-[160px] w-14 h-14 bg-gradient-to-br from-primary to-accent text-white rounded-full shadow-[0_8px_20px_rgba(59,130,246,0.35)] flex items-center justify-center hover:scale-105 active:scale-95 transition-all duration-300 z-20">
                            <IconPlus />
                        </button>
                    )}
                </div>
            );
        };

        // --- Screens ---

        const ConfigErrorScreen = () => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-center">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6">
                    <IconSettings size={32} />
                </div>
                <h2 className="text-xl font-bold text-slate-800 mb-3">設定が必要です</h2>
                <p className="text-sm text-slate-500 mb-6 leading-relaxed">
                    ローカル環境で実行するためには、Firebaseプロジェクトの設定が必要です。<br/>
                    HTMLファイルのソースコード内にある <code>USER_FIREBASE_CONFIG</code> の項目に、ご自身のAPIキーなどの情報を貼り付けてから再度読み込んでください。
                </p>
            </div>
        );

        const WelcomeScreen = ({ db, appId, userId }) => {
            const [name, setName] = React.useState('');
            const saveProfile = async () => {
                if(!name.trim()) return;
                const { doc, setDoc } = window.firebaseModules;
                await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'main'), {
                    name: name.trim(), readStatus: {}
                });
            };
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-gradient-to-br from-slate-50 via-white to-blue-50 text-center relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-accent/5 rounded-full blur-3xl"></div>
                    
                    <div className="relative z-10 w-full max-w-sm">
                        <div className="w-20 h-20 bg-gradient-to-br from-primary to-accent text-white rounded-3xl flex items-center justify-center font-bold text-4xl shadow-xl shadow-primary/20 mx-auto mb-8 animate-slide-up">T</div>
                        <h1 className="text-2xl font-bold text-slate-800 mb-3 animate-slide-up" style={{animationDelay: '0.1s'}}>TeamSync へようこそ</h1>
                        <p className="text-slate-500 text-sm mb-10 leading-relaxed animate-slide-up" style={{animationDelay: '0.2s'}}>チーム内で共有されるマニュアルや<br/>最新の指示をリアルタイムで確認できます。</p>
                        
                        <div className="animate-slide-up" style={{animationDelay: '0.3s'}}>
                            <input 
                                type="text" value={name} onChange={e => setName(e.target.value)}
                                placeholder="あなたの表示名（例: 山田 太郎）"
                                className="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 mb-4 text-center text-slate-800 font-medium focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all shadow-sm"
                            />
                            <button onClick={saveProfile} disabled={!name.trim()} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl disabled:opacity-40 disabled:bg-slate-300 hover:bg-slate-700 active:scale-[0.98] transition-all shadow-md">
                                アプリをはじめる
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const PostList = ({ posts, profile, onOpen }) => {
            if (posts.length === 0) {
                return (
                    <div className="h-full flex flex-col items-center justify-center text-slate-400 p-8 text-center animate-fade-in">
                        <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"><IconMessageCircle size={32} className="text-slate-300" /></div>
                        <p className="text-sm">まだ共有されている情報がありません。<br/>右下の＋ボタンから追加しましょう。</p>
                    </div>
                );
            }

            return (
                <div className="p-4 space-y-4 pb-24">
                    {posts.map((post, idx) => {
                        const lastRead = profile.readStatus?.[post.id] || 0;
                        const isNew = post.createdAt === post.updatedAt && post.createdAt > lastRead;
                        const isUpdated = post.createdAt !== post.updatedAt && post.updatedAt > lastRead;
                        const commentCount = post.comments ? post.comments.length : 0;

                        return (
                            <div key={post.id} onClick={() => onOpen(post)} 
                                 className="group bg-white rounded-3xl p-5 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100/60 cursor-pointer hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] transition-all duration-300 hover:-translate-y-0.5 animate-slide-up"
                                 style={{ animationDelay: `${idx * 0.05}s` }}>
                                
                                <div className="flex items-start justify-between mb-3 gap-2">
                                    <h2 className="font-bold text-slate-800 text-[17px] leading-snug line-clamp-2">{post.title}</h2>
                                    <div className="flex flex-col gap-1 items-end shrink-0">
                                        {isNew && <span className="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full border border-blue-100">✨ New</span>}
                                        {isUpdated && <span className="bg-amber-50 text-amber-600 text-[10px] font-bold px-2 py-1 rounded-full border border-amber-100">🔄 変更あり</span>}
                                    </div>
                                </div>
                                
                                <p className="text-[13px] text-slate-500 line-clamp-2 mb-4 leading-relaxed">{post.content}</p>
                                
                                {post.mediaBase64 && (
                                    <div className="h-32 w-full rounded-2xl bg-slate-100 mb-4 overflow-hidden border border-slate-100">
                                        <img src={post.mediaBase64} alt="thumbnail" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    </div>
                                )}
                                
                                <div className="flex items-center justify-between text-xs text-slate-400 font-medium pt-2 border-t border-slate-50">
                                    <div className="flex items-center gap-2">
                                        <div className="w-6 h-6 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-[10px] font-bold">{post.authorName[0]}</div>
                                        <span>{post.authorName}</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {commentCount > 0 && <div className="flex items-center gap-1 text-slate-500"><IconMessageCircle size={14}/> {commentCount}</div>}
                                        <span>{timeAgo(post.updatedAt)}</span>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const PostDetail = ({ post, profile, db, appId, userId }) => {
            const [comment, setComment] = React.useState('');
            const [initialRead] = React.useState(profile.readStatus?.[post.id] || 0);

            React.useEffect(() => {
                if (post.updatedAt > initialRead) {
                    const { doc, setDoc } = window.firebaseModules;
                    setDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'main'), 
                           { readStatus: { ...profile.readStatus, [post.id]: Date.now() } }, 
                           { merge: true });
                }
            }, [post.id]);

            const submitComment = async () => {
                if(!comment.trim()) return;
                const { doc, updateDoc } = window.firebaseModules;
                const newComment = { id: crypto.randomUUID(), authorId: userId, authorName: profile.name, text: comment.trim(), createdAt: Date.now() };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id), {
                    comments: [...(post.comments || []), newComment]
                });
                setComment('');
            };

            const newLogs = (post.updateLogs || []).filter(log => log.timestamp > initialRead);

            return (
                <div className="flex flex-col min-h-full bg-white animate-fade-in pb-32">
                    <div className="p-6">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center font-bold text-lg">{post.authorName[0]}</div>
                            <div>
                                <div className="text-sm font-bold text-slate-800">{post.authorName}</div>
                                <div className="text-xs text-slate-400">{timeAgo(post.createdAt)} 作成</div>
                            </div>
                        </div>

                        <h1 className="text-2xl font-bold text-slate-900 mb-6 leading-tight tracking-tight">{post.title}</h1>

                        {newLogs.length > 0 && (
                            <div className="bg-amber-50/50 border border-amber-200/60 rounded-2xl p-4 mb-6 shadow-sm">
                                <h3 className="text-amber-800 font-bold flex items-center gap-2 mb-3 text-sm">
                                    <IconBell size={18} className="text-amber-500" /> 前回閲覧からの更新内容
                                </h3>
                                <ul className="space-y-2">
                                    {newLogs.map((log, i) => (
                                        <li key={i} className="text-[13px] text-amber-900 bg-white/60 p-2.5 rounded-xl border border-amber-100/50">
                                            <span className="font-bold mr-2">{log.authorName}:</span> {log.note}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        <div className="text-slate-700 text-[15px] leading-[1.8] whitespace-pre-wrap mb-8">
                            {post.content}
                        </div>

                        {post.mediaBase64 && (
                            <div className="mb-8 rounded-3xl overflow-hidden border border-slate-100 shadow-sm">
                                <img src={post.mediaBase64} alt="添付画像" className="w-full h-auto" />
                            </div>
                        )}

                        {post.link && (
                            <a href={post.link} target="_blank" rel="noopener noreferrer" 
                               className="flex items-center gap-4 p-4 mb-8 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-slate-100 transition-colors group">
                                <div className="bg-white p-3 rounded-xl shadow-sm group-hover:scale-110 transition-transform"><IconLink size={20} className="text-primary" /></div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="text-sm font-bold text-slate-800 truncate">参考リンクを開く</div>
                                    <div className="text-xs text-slate-500 truncate mt-1">{post.link}</div>
                                </div>
                            </a>
                        )}

                        {/* Comments */}
                        <div className="mt-8 pt-8 border-t border-slate-100">
                            <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <IconMessageCircle size={20} className="text-slate-400"/> コメント ({post.comments?.length || 0})
                            </h3>
                            <div className="space-y-4">
                                {(post.comments || []).map(c => (
                                    <div key={c.id} className="bg-slate-50 rounded-2xl p-4">
                                        <div className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-[13px] text-slate-800">{c.authorName}</span>
                                            <span className="text-[11px] text-slate-400">{timeAgo(c.createdAt)}</span>
                                        </div>
                                        <p className="text-[14px] text-slate-600 whitespace-pre-wrap leading-relaxed">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Floating Comment Input (Glassmorphism) */}
                    <div className="fixed bottom-6 left-4 right-4 max-w-md mx-auto z-10 pb-safe">
                        <div className="glass-panel rounded-full p-1.5 pl-5 flex items-center shadow-[0_8px_30px_rgba(0,0,0,0.08)]">
                            <input 
                                type="text" value={comment} onChange={e => setComment(e.target.value)}
                                placeholder="コメントを入力..."
                                className="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 placeholder-slate-400 text-slate-800 outline-none"
                            />
                            <button onClick={submitComment} disabled={!comment.trim()} 
                                    className="p-3 bg-slate-800 text-white rounded-full disabled:opacity-30 disabled:bg-slate-400 hover:bg-slate-700 transition-colors shrink-0">
                                <IconSend size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const PostForm = ({ post, profile, db, appId, userId, onSave, onCancel }) => {
            const isEdit = !!post;
            const [title, setTitle] = React.useState(post?.title || '');
            const [content, setContent] = React.useState(post?.content || '');
            const [link, setLink] = React.useState(post?.link || '');
            const [mediaBase64, setMediaBase64] = React.useState(post?.mediaBase64 || null);
            const [updateNote, setUpdateNote] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const handleImage = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                try {
                    const base64 = await compressImage(file);
                    setMediaBase64(base64);
                } catch(err) { alert('画像の処理に失敗しました。'); }
            };

            const submit = async () => {
                if(!title.trim() || !content.trim()) return;
                setSaving(true);
                const { collection, doc, setDoc, updateDoc } = window.firebaseModules;
                const now = Date.now();

                try {
                    if (isEdit) {
                        const logs = post.updateLogs || [];
                        if (updateNote.trim()) logs.push({ timestamp: now, authorName: profile.name, note: updateNote.trim() });
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id), {
                            title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64, updatedAt: now, updateLogs: logs
                        });
                    } else {
                        const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'));
                        await setDoc(newRef, {
                            id: newRef.id, title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64,
                            createdAt: now, updatedAt: now, authorId: userId, authorName: profile.name, comments: [], updateLogs: []
                        });
                    }
                    onSave();
                } catch(e) { console.error(e); alert("保存に失敗しました。"); setSaving(false); }
            };

            const handleDelete = async () => {
                if(confirm("このマニュアルを削除しますか？")) {
                    setSaving(true);
                    const { doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id));
                    onSave();
                }
            };

            return (
                <div className="p-6 bg-white min-h-full animate-fade-in flex flex-col pb-safe">
                    <h2 className="text-xl font-bold text-slate-800 mb-6">{isEdit ? 'マニュアルの編集' : '新規作成'}</h2>
                    
                    <div className="space-y-6 flex-1">
                        <div>
                            <label className="block text-[11px] font-bold text-slate-400 mb-2 tracking-wider">タイトル</label>
                            <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：商品Aの撮影ルール" 
                                   className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-[15px] focus:bg-white focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all" />
                        </div>
                        
                        <div>
                            <label className="block text-[11px] font-bold text-slate-400 mb-2 tracking-wider">詳細・手順</label>
                            <textarea value={content} onChange={e=>setContent(e.target.value)} rows="6" placeholder="詳細な手順や注意点を入力..." 
                                      className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-[15px] leading-relaxed focus:bg-white focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all resize-none"></textarea>
                        </div>

                        <div className="p-5 bg-slate-50 border border-slate-100 rounded-3xl space-y-5">
                            <div>
                                <label className="flex items-center gap-2 text-[13px] font-bold text-slate-700 mb-3"><IconImage size={18} className="text-slate-400"/> 画像を添付</label>
                                {mediaBase64 ? (
                                    <div className="relative rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
                                        <img src={mediaBase64} className="w-full h-32 object-cover" />
                                        <button onClick={()=>setMediaBase64(null)} className="absolute top-2 right-2 bg-slate-900/60 backdrop-blur text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm hover:bg-slate-900/80 transition-colors">✕</button>
                                    </div>
                                ) : (
                                    <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                        <div className="text-[13px] text-slate-500 font-medium">タップして写真を選択</div>
                                        <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                    </label>
                                )}
                            </div>
                            
                            <div>
                                <label className="flex items-center gap-2 text-[13px] font-bold text-slate-700 mb-3"><IconLink size={18} className="text-slate-400"/> 参考リンク</label>
                                <input type="url" value={link} onChange={e=>setLink(e.target.value)} placeholder="https://..." 
                                       className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[14px] focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" />
                                <p className="text-[11px] text-slate-400 mt-2 leading-relaxed">動画や資料はGoogle Drive等のリンクを貼付してください</p>
                            </div>
                        </div>

                        {isEdit && (
                            <div className="p-5 bg-amber-50/50 border border-amber-200/60 rounded-3xl">
                                <label className="block text-[12px] font-bold text-amber-800 mb-2">今回の変更内容（他メンバーに通知されます）</label>
                                <input type="text" value={updateNote} onChange={e=>setUpdateNote(e.target.value)} placeholder="例：背景色の指定を白に変更しました" 
                                       className="w-full bg-white border border-amber-200/60 rounded-xl px-4 py-3 text-[14px] focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 transition-all" />
                            </div>
                        )}
                    </div>

                    <div className="mt-8 flex gap-3">
                        {isEdit && (
                            <button onClick={handleDelete} disabled={saving} className="p-4 bg-red-50 text-red-500 rounded-2xl hover:bg-red-100 transition-colors">
                                <IconTrash size={20}/>
                            </button>
                        )}
                        <button onClick={onCancel} disabled={saving} className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-colors">キャンセル</button>
                        <button onClick={submit} disabled={saving || !title.trim() || !content.trim()} className="flex-[2] bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-700 transition-colors shadow-md disabled:opacity-40 disabled:bg-slate-300">
                            {saving ? '保存中...' : (isEdit ? '更新する' : '投稿する')}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
