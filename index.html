<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy Sharing - マニュアル共有アプリ</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: { 
                        primary: '#3b82f6',     // Blue 500
                        primaryHover: '#2563eb', // Blue 600
                        accent: '#6366f1'        // Indigo 500
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
    <style>
        body { 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            color: #0f172a;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // 【重要】Firebaseプロジェクトの設定
        // 実際にシステムとして運用する場合は、ご自身のFirebaseプロジェクトの設定を
        // 以下に貼り付けてください。（Firebaseコンソールから取得できます）
        // =========================================================================
        const USER_FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAFwlFLR6Ck3hr9yRPkAEbwHJD_oV1BBI",
  authDomain: "ito-game-90d85.firebaseapp.com",
  projectId: "ito-game-90d85",
  storageBucket: "ito-game-90d85.firebasestorage.app",
  messagingSenderId: "142358300494",
  appId: "1:142358300494:web:8081759097cf17ed03c01f",
  measurementId: "G-4HZT4F4D7J"
};
        // =========================================================================

        // --- 洗練された細線のアイコン群 (Stroke Width 1.5) ---
        const IconPlus = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconImage = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const IconLink = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconMessageCircle = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        const IconEdit = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconBell = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>;
        const IconTrash = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconSettings = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>

        // --- Utils ---
        const timeAgo = (ms) => {
            const seconds = Math.floor((Date.now() - ms) / 1000);
            if (seconds < 60) return "たった今";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}分前`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}時間前`;
            const days = Math.floor(hours / 24);
            if (days < 30) return `${days}日前`;
            const date = new Date(ms);
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1000;
                        let { width, height } = img;
                        if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                        else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        };

        // --- App Component ---
        const App = () => {
            const [fbReady, setFbReady] = React.useState(!!window.firebaseModules);
            const [configError, setConfigError] = React.useState(false);
            const [appId, setAppId] = React.useState('default-teamsync-app');
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            
            const [posts, setPosts] = React.useState([]);
            const [view, setView] = React.useState('list'); 
            const [selectedPost, setSelectedPost] = React.useState(null);

            // 1. Initialize Firebase
            React.useEffect(() => {
                const init = () => {
                    setFbReady(true);
                    const { initializeApp, getAuth, getFirestore } = window.firebaseModules;
                    
                    let config = null;
                    // 環境変数からの読み込み（Canvas環境用）
                    try { 
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            config = JSON.parse(__firebase_config); 
                        }
                    } catch(e){}

                    // ユーザー設定の読み込み（ローカル環境用）
                    if (!config && USER_FIREBASE_CONFIG.apiKey) {
                        config = USER_FIREBASE_CONFIG;
                    }

                    // 設定が空の場合はエラー画面を表示
                    if (!config || !config.apiKey) {
                        setConfigError(true);
                        return;
                    }

                    try {
                        const app = initializeApp(config);
                        setAuth(getAuth(app));
                        setDb(getFirestore(app));
                        if (typeof __app_id !== 'undefined') setAppId(__app_id);
                    } catch (e) {
                        console.error("Firebase初期化エラー:", e);
                        setConfigError(true);
                    }
                };
                if (window.firebaseModules) init();
                else window.addEventListener('firebaseLoaded', init);
                return () => window.removeEventListener('firebaseLoaded', init);
            }, []);

            // 2. Auth Flow (ID/Pass 認証 ＋ オンライン監視)
React.useEffect(() => {
    if (!auth || !db) return;
    const { onAuthStateChanged, signOut } = window.firebaseModules;
    const { doc, getDoc, setDoc, updateDoc } = window.firebaseModules;

    const unsub = onAuthStateChanged(auth, async (currentUser) => {
        if (currentUser) {
            const userRef = doc(db, 'artifacts', appId, 'userList', currentUser.uid);
            const userSnap = await getDoc(userRef);

            // リストに存在し、かつ「一時停止（無効化）」されている場合のみ弾く
            if (userSnap.exists() && userSnap.data().isActive === false) {
                alert("このアカウントは一時停止されています。管理者にお問い合わせください。");
                await signOut(auth);
                setUser(null);
                return;
            }

            // データが存在しない場合（過去のアカウントや、リストから完全削除された後）は、
            // ログイン成功と同時にリスト（データベース）に自動登録して復帰させる
            await setDoc(userRef, {
                email: currentUser.email,
                name: userSnap.exists() && userSnap.data().name ? userSnap.data().name : currentUser.email.replace('@easysharing.local', ''),
                lastActiveAt: Date.now(),
                isActive: true
            }, { merge: true });

            setUser(currentUser);
            
            // アプリを開いている間、5分おきにオンライン時間を更新する
            const interval = setInterval(() => {
                updateDoc(userRef, { lastActiveAt: Date.now() }).catch(e => console.error(e));
            }, 5 * 60 * 1000); // 5分
            
            return () => clearInterval(interval);
        } else {
            setUser(null);
        }
    });
    return () => unsub();
}, [auth, db, appId]);

// 管理者かどうかの判定
const isAdmin = user && user.email && user.email.includes('admin@');

            // 3. Data Fetching
const [userMap, setUserMap] = React.useState({}); // 追加：全ユーザーの名前辞書

React.useEffect(() => {
    if (!db || !user) return;
    const { doc, onSnapshot, collection } = window.firebaseModules;
    
    // ① 自分のプロフィール取得
    const userRef = doc(db, 'artifacts', appId, 'userList', user.uid);
    const unsubProfile = onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) setProfile(docSnap.data());
        else setProfile({ name: user.email.replace('@easysharing.local', ''), readStatus: {} });
    }, console.error);

    // ② 全ユーザーの名前リストを取得（名前の動的変更用）
    const usersRef = collection(db, 'artifacts', appId, 'userList');
    const unsubUsers = onSnapshot(usersRef, (snap) => {
        let umap = {};
        snap.forEach(d => { umap[d.id] = d.data(); });
        setUserMap(umap);
    }, console.error);

    // ③ 投稿一覧を取得
    const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
    const unsubPosts = onSnapshot(postsRef, (snap) => {
        let loaded = [];
        snap.forEach(d => loaded.push({ id: d.id, ...d.data() }));
        loaded.sort((a, b) => b.updatedAt - a.updatedAt);
        setPosts(loaded);
    }, console.error);

    return () => { unsubProfile(); unsubUsers(); unsubPosts(); };
}, [db, user, appId]);

// Routing & 画面表示の分岐
if (!fbReady) return <div className="min-h-screen flex items-center justify-center text-slate-400">システムの読み込み中...</div>;
if (!user) return <LoginScreen auth={auth} />;
if (!profile) return <div className="min-h-screen flex items-center justify-center text-slate-400">読み込み中...</div>;

if (view === 'admin' && isAdmin) return <AdminPanel auth={auth} db={db} appId={appId} userMap={userMap} onBack={() => setView('list')} />;
if (view === 'account') return <AccountScreen user={user} profile={profile} auth={auth} onBack={() => setView('list')} />;

// Handlers
const goHome = () => { setView('list'); setSelectedPost(null); };
const openForm = (post = null) => { setSelectedPost(post); setView('form'); };
const openDetail = (post) => { setSelectedPost(post); setView('detail'); };

return (
    <div className="max-w-5xl mx-auto bg-[#f8fafc] min-h-screen shadow-[0_0_40px_rgba(0,0,0,0.05)] relative flex flex-col font-sans text-slate-800">
        {/* Glassmorphism Header */}
        <div className="glass-header px-5 py-3.5 sticky top-0 z-20 pt-safe flex items-center justify-between transition-all">
            {view !== 'list' ? (
                <button onClick={goHome} className="p-2 -ml-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100/50 rounded-full transition-all">
                    <IconArrowLeft />
                </button>
            ) : (
                <div className="flex items-center gap-3 animate-fade-in">
                    <div className="w-9 h-9 bg-gradient-to-br from-primary to-accent text-white rounded-xl flex items-center justify-center font-bold text-lg shadow-lg shadow-primary/30">T</div>
                    <div className="flex flex-col">
                        <h1 className="font-bold text-slate-800 text-lg leading-none tracking-tight">Easy Sharing</h1>
                        <span className="text-[10px] text-slate-500 font-medium mt-1">マニュアル共有アプリ</span>
                    </div>
                </div>
            )}
            
            <div className="flex items-center gap-2">
                {isAdmin && view === 'list' && (
                    <button onClick={() => setView('admin')} className="p-2 text-slate-500 hover:text-primary rounded-full transition-all">
                        <IconSettings size={20} />
                    </button>
                )}
                
                {/* ユーザーのアイコンをタップ可能にする */}
                {view === 'list' && (
                    <button onClick={() => setView('account')} className="flex items-center gap-2 px-3 py-1.5 bg-white rounded-full shadow-sm border border-slate-100 hover:bg-slate-50 transition-all">
                        <div className="w-5 h-5 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-[10px] font-bold uppercase">
                            {profile.name ? profile.name[0] : '?'}
                        </div>
                        <span className="text-xs font-semibold text-slate-600">{profile.name}</span>
                    </button>
                )}
                
                {view === 'detail' && (
                    <button onClick={() => openForm(selectedPost)} className="p-2 -mr-2 text-slate-500 hover:text-primary hover:bg-slate-100/50 rounded-full transition-all">
                        <IconEdit size={20} />
                    </button>
                )}
            </div>
        </div>

                    {/* Main Content Area */}
                    <div className="flex-1 overflow-y-auto hide-scrollbar relative">
                        {view === 'list' && <PostList posts={posts} profile={profile} userMap={userMap} onOpen={openDetail} />}
                        {view === 'detail' && selectedPost && (
                            <PostDetail post={posts.find(p => p.id === selectedPost.id) || selectedPost} profile={profile} db={db} appId={appId} userId={user.uid} userMap={userMap} />
                        )}
                        {view === 'form' && (
                            <PostForm post={selectedPost} profile={profile} db={db} appId={appId} userId={user.uid} onSave={goHome} onCancel={selectedPost ? () => setView('detail') : goHome} />
                        )}
                    </div>

                    {/* FAB Button */}
                    {view === 'list' && (
                        <button onClick={() => openForm()} className="fixed bottom-8 right-6 md:bottom-10 md:right-10 w-14 h-14 bg-gradient-to-br from-primary to-accent text-white rounded-full shadow-[0_8px_20px_rgba(59,130,246,0.35)] flex items-center justify-center hover:scale-105 active:scale-95 transition-all duration-300 z-20">
                            <IconPlus />
                        </button>
                    )}
                </div>
            );
        };

        // --- Screens ---

        const AccountScreen = ({ user, profile, auth, onBack }) => (
    <div className="p-6 md:p-10 max-w-2xl mx-auto w-full min-h-screen animate-fade-in flex flex-col">
        <div className="flex items-center justify-between mb-8">
            <button onClick={onBack} className="text-slate-500 hover:text-slate-800 flex items-center gap-2 transition-colors">
                <IconArrowLeft /> 戻る
            </button>
        </div>
        
        <h2 className="text-2xl font-bold mb-8 text-slate-800">アカウント情報</h2>
        
        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm flex-1">
            <div className="flex flex-col items-center justify-center mb-8">
                <div className="w-20 h-20 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-2xl font-bold uppercase mb-4">
                    {profile.name ? profile.name[0] : '?'}
                </div>
                <h3 className="text-xl font-bold text-slate-800">{profile.name}</h3>
                <p className="text-sm text-slate-500 mt-1">ログインID: {user.email.replace('@easysharing.local', '')}</p>
            </div>
            
            <div className="bg-slate-50 p-4 rounded-2xl mb-8">
                <p className="text-sm text-slate-600 text-center leading-relaxed">
                    お名前やパスワードの変更が必要な場合は、<br/>システム管理者へお問い合わせください。
                </p>
            </div>

            <button onClick={() => window.firebaseModules.signOut(auth)} className="w-full py-4 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition-colors">
                ログアウト
            </button>
        </div>
    </div>
);

        const LoginScreen = ({ auth }) => {
    const [email, setEmail] = React.useState('');
    const [password, setPassword] = React.useState('');
    const [error, setError] = React.useState('');

    const handleLogin = async (e) => {
    e.preventDefault();
    setError('');
    try {
        const { signInWithEmailAndPassword } = window.firebaseModules;
        
        // もし入力されたIDに「@」が無ければ、自動で「@easysharing.local」を付けてあげる親切設計
        const loginEmail = email.includes('@') ? email : `${email}@easysharing.local`;
        
        await signInWithEmailAndPassword(auth, loginEmail, password);
    } catch (err) {
        console.error("Firebaseエラー詳細:", err); // 開発者ツール（F12）で原因を確認するため
        
        // エラーの種類によってメッセージを変える
        if (err.code === 'auth/invalid-email') {
            setError('IDの形式が正しくありません。');

            );
        };

        const PostForm = ({ post, profile, db, appId, userId, onSave, onCancel }) => {
    const isEdit = !!post;
    const [title, setTitle] = React.useState(post?.title || '');
    const [content, setContent] = React.useState(post?.content || '');
    const [link, setLink] = React.useState(post?.link || '');
    const [mediaBase64, setMediaBase64] = React.useState(post?.mediaBase64 || null);
    
    // ポップアップ用のステート
    const [showConfirm, setShowConfirm] = React.useState(false);
    const [autoDiffText, setAutoDiffText] = React.useState('');
    const [saving, setSaving] = React.useState(false);

    const handleImage = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        try {
            const base64 = await compressImage(file);
            setMediaBase64(base64);
        } catch(err) { alert('画像の処理に失敗しました。'); }
    };

    // 賢い差分抽出関数（前後の文章から変更された短い部分を抜き出す）
    const generateDiff = (oldText, newText) => {
        if (!oldText) oldText = ""; if (!newText) newText = "";
        if (oldText === newText) return "";
        let start = 0;
        while(start < oldText.length && start < newText.length && oldText[start] === newText[start]) start++;
        let oldEnd = oldText.length - 1; let newEnd = newText.length - 1;
        while(oldEnd >= start && newEnd >= start && oldText[oldEnd] === newText[newEnd]) { oldEnd--; newEnd--; }
        const oldPart = oldText.substring(start, oldEnd + 1);
        const newPart = newText.substring(start, newEnd + 1);
        
        if (oldPart.length > 30 || newPart.length > 30) return "内容を大幅に更新しました";
        if (oldPart && newPart) return `「${oldPart}」を「${newPart}」に変更しました`;
        if (oldPart && !newPart) return `「${oldPart}」を削除しました`;
        if (!oldPart && newPart) return `「${newPart}」を追記しました`;
        return "内容を更新しました";
    };

    // 「更新する」を押した時の処理（一旦ポップアップを出す）
    const handlePreSubmit = () => {
        if(!title.trim() || !content.trim()) return;
        if (isEdit) {
            const diffs = [];
            const tDiff = generateDiff(post.title, title);
            const cDiff = generateDiff(post.content, content);
            if (tDiff) diffs.push(`タイトル: ${tDiff}`);
            if (cDiff) diffs.push(`内容: ${cDiff}`);
            if (post.link !== link) diffs.push("参考リンクを変更しました");
            if (post.mediaBase64 !== mediaBase64) diffs.push("添付画像を変更しました");
            
            setAutoDiffText(diffs.length > 0 ? diffs.join('\n') : '軽微な修正を行いました');
            setShowConfirm(true); // ポップアップを表示
        } else {
            submitFinal(''); // 新規作成時はそのまま保存
        }
    };

    // 最終的な保存処理
    const submitFinal = async (finalLogText) => {
        setSaving(true);
        const { collection, doc, setDoc, updateDoc } = window.firebaseModules;
        const now = Date.now();

        try {
            if (isEdit) {
                const logs = post.updateLogs || [];
                if (finalLogText.trim()) logs.push({ timestamp: now, authorId: userId, authorName: profile.name, note: finalLogText.trim() });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id), {
                    title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64, updatedAt: now, updateLogs: logs
                });
            } else {
                const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'));
                await setDoc(newRef, {
                    id: newRef.id, title: title.trim(), content: content.trim(), link: link.trim(), mediaBase64,
                    createdAt: now, updatedAt: now, authorId: userId, authorName: profile.name, comments: [], updateLogs: []
                });
            }
            
            // 追加：管理画面用の操作ログも記録
            await setDoc(doc(collection(db, 'artifacts', appId, 'activityLogs')), {
                uid: userId, action: isEdit ? '編集' : '新規作成', target: title.trim(), detail: finalLogText, createdAt: now
            });

            onSave();
        } catch(e) { console.error(e); alert("保存に失敗しました。"); setSaving(false); }
    };

    const handleDelete = async () => {
        if(confirm("このマニュアルを削除しますか？")) {
            setSaving(true);
            const { doc, deleteDoc, setDoc, collection } = window.firebaseModules;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id));
            await setDoc(doc(collection(db, 'artifacts', appId, 'activityLogs')), {
                uid: userId, action: '削除', target: title.trim(), detail: '', createdAt: Date.now()
            });
            onSave();
        }
    };

    return (
        <div className="p-6 bg-white min-h-full animate-fade-in flex flex-col pb-safe relative">
            <h2 className="text-xl font-bold text-slate-800 mb-6">{isEdit ? 'マニュアルの編集' : '新規作成'}</h2>
            
            <div className="space-y-6 flex-1">
                <div>
                    <label className="block text-[11px] font-bold text-slate-400 mb-2 tracking-wider">タイトル</label>
                    <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：商品Aの撮影ルール" 
                           className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-[15px] focus:bg-white focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all" />
                </div>
                <div>
                    <label className="block text-[11px] font-bold text-slate-400 mb-2 tracking-wider">詳細・手順</label>
                    <textarea value={content} onChange={e=>setContent(e.target.value)} rows="6" placeholder="詳細な手順や注意点を入力..." 
                              className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-[15px] leading-relaxed focus:bg-white focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all resize-none"></textarea>
                </div>

                <div className="p-5 bg-slate-50 border border-slate-100 rounded-3xl space-y-5">
                    {/* 画像とリンクの入力部分は変更なし */}
                    <div>
                        <label className="flex items-center gap-2 text-[13px] font-bold text-slate-700 mb-3"><IconImage size={18} className="text-slate-400"/> 画像を添付</label>
                        {mediaBase64 ? (
                            <div className="relative rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
                                <img src={mediaBase64} className="w-full h-32 object-cover" />
                                <button onClick={()=>setMediaBase64(null)} className="absolute top-2 right-2 bg-slate-900/60 backdrop-blur text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-sm">✕</button>
                            </div>
                        ) : (
                            <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                                <div className="text-[13px] text-slate-500 font-medium">タップして写真を選択</div>
                                <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                            </label>
                        )}
                    </div>
                    <div>
                        <label className="flex items-center gap-2 text-[13px] font-bold text-slate-700 mb-3"><IconLink size={18} className="text-slate-400"/> 参考リンク</label>
                        <input type="url" value={link} onChange={e=>setLink(e.target.value)} placeholder="https://..." 
                               className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[14px] focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" />
                    </div>
                </div>
            </div>

            <div className="mt-8 flex gap-3">
                {isEdit && (
                    <button onClick={handleDelete} disabled={saving} className="p-4 bg-red-50 text-red-500 rounded-2xl hover:bg-red-100 transition-colors"><IconTrash size={20}/></button>
                )}
                <button onClick={onCancel} disabled={saving} className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-colors">キャンセル</button>
                <button onClick={handlePreSubmit} disabled={saving || !title.trim() || !content.trim()} className="flex-[2] bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-700 transition-colors shadow-md disabled:opacity-40 disabled:bg-slate-300">
                    {saving ? '保存中...' : (isEdit ? '更新を確認する' : '投稿する')}
                </button>
            </div>

            {/* 確認ポップアップ（差分編集） */}
            {showConfirm && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-6">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-slide-up">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">変更内容の確認</h3>
                        <p className="text-xs text-slate-500 mb-4">自動抽出された変更点です。手動で書き換えることもできます。</p>
                        <textarea value={autoDiffText} onChange={e=>setAutoDiffText(e.target.value)} rows="4"
                                  className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-[14px] leading-relaxed focus:bg-white focus:outline-none focus:border-primary transition-all resize-none"></textarea>
                        
                        <div className="mt-6 flex gap-3">
                            <button onClick={() => setShowConfirm(false)} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">戻る</button>
                            <button onClick={() => { setShowConfirm(false); submitFinal(autoDiffText); }} className="flex-1 bg-primary text-white font-bold py-3 rounded-xl shadow-md">これで保存</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
